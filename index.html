<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#06070a" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="data:," />
  <title>DungeonDex v1.23.7</title>
  <link rel="stylesheet" href="./styles.css?build=1.23.7-rival-trace-result-detail-polish" />
  <style>
    /* v1.23.7 Rival Trace Result Detail Polish update. */
    .panel {
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .section-header.panel,
    .tabs.panel,
    .sticky-actions.panel {
      border-color: rgba(255,213,148,0.10);
    }

    .tab.active,
    .primary {
      box-shadow: 0 0 14px rgba(255,162,70,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* v1.6.21 uncommon rarity hotfix: restore the pre-theme green uncommon read. */
    .rarity-uncommon {
      color: #a8f0b3;
    }

    .pill.rarity-uncommon,
    .rarity-uncommon.pill {
      color: #a8f0b3;
      border-color: rgba(168,240,179,0.30);
      background: rgba(168,240,179,0.075);
    }

    .rarity-card-uncommon {
      --rarity-bg: rgba(168,240,179,0.045);
      --rarity-border: rgba(168,240,179,0.18);
      --rarity-glow: rgba(168,240,179,0.06);
      --rarity-sheen: rgba(168,240,179,0.11);
    }

    /* Intro modal CSS cleanup: compact, readable, and mobile-safe. */
    .threshold-hero {
      gap: 9px;
      padding: 13px;
    }

    .threshold-district-card {
      padding: 9px 10px;
    }

    .threshold-progress {
      gap: 5px;
      padding: 8px 9px;
    }

    .threshold-roadmap-card {
      gap: 8px;
      padding: 9px;
      border-radius: 14px;
      border-color: rgba(255,214,151,0.13);
      background: rgba(0,0,0,0.18);
      box-shadow: none;
    }

    .threshold-roadmap-head {
      gap: 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,214,151,0.10);
    }

    .threshold-roadmap-card .threshold-label {
      font-family: var(--font);
      font-size: 0.6rem;
      line-height: 1.1;
      letter-spacing: 0.12em;
    }

    .threshold-roadmap-copy {
      max-width: 34rem;
      color: rgba(240,234,222,0.72);
      font-family: var(--font);
      font-size: clamp(0.72rem, 2vw, 0.82rem);
      line-height: 1.3;
    }

    .threshold-roadmap-list {
      gap: 5px;
    }

    .threshold-roadmap-row {
      grid-template-columns: 5.35rem minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 34px;
      padding: 7px 8px;
      border-radius: 10px;
      border-color: rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.20);
    }

    .threshold-roadmap-key {
      color: #f6d9a1;
      font-family: var(--font);
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      line-height: 1;
      white-space: nowrap;
    }

    .threshold-roadmap-value {
      min-width: 0;
      color: rgba(248,246,238,0.88);
      font-family: var(--font);
      font-size: clamp(0.74rem, 2.2vw, 0.84rem);
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .threshold-footer span {
      padding: 6px 8px;
      font-size: 0.72rem;
    }

    @media (max-width: 430px) {
      .threshold-hero {
        gap: 8px;
        padding: 11px;
      }

      .threshold-roadmap-row {
        grid-template-columns: 1fr;
        gap: 4px;
        align-items: start;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-labelledby="buildTag">
      <div>
        <h1 id="buildTag">DungeonDex v1.23.7</h1>
      </div>
      <div class="top-actions" aria-label="Save controls">
        <span class="save-status" id="saveStatus" aria-live="polite">Saved</span>
        <button class="ghost mini" id="saveBtn" type="button">Save</button>
        <button class="ghost mini" id="resetBtn" type="button">Reset</button>
      </div>
    </header>

    <nav class="tabs panel" aria-label="Primary screens">
      <button class="tab active" data-screen="town" id="tab-town" type="button" aria-controls="screen-town">Town</button>
      <button class="tab" data-screen="run" id="tab-run" type="button" aria-controls="screen-run">Run</button>
      <button class="tab" data-screen="gear" id="tab-gear" type="button" aria-controls="screen-gear">Gear</button>
      <button class="tab" data-screen="dex" id="tab-dex" type="button" aria-controls="screen-dex">Trophy Hall</button>
      <button class="tab" data-screen="archive" id="tab-archive" type="button" aria-controls="screen-archive">Archive</button>
    </nav>

    <main class="screens" aria-label="DungeonDex screens">
      <section class="screen active" id="screen-town" aria-labelledby="tab-town">
        <div class="stack-8">
          <div class="panel section-header">
            <div>
              <h2 id="districtName">Lowfire District</h2>
              <p id="districtLine">Lowfire holds the line. The Hollow Stair waits below.</p>
              <div class="district-wallet-slot" id="districtWalletSlot"></div>
              <div class="district-wallet-slot" id="revisitFoundationSlot"></div>
            </div>
            <div class="inline-actions" aria-label="Town actions">
              <button class="primary" id="startRunBtn" type="button">Enter Dungeon</button>
              <button class="ghost" id="restBtn" type="button">Rest</button>
              <span class="rest-cost-chip" id="restCostPill" title="Rest cost">Cost --</span>
            </div>
            <div class="district-charter-slot" id="districtCharterSlot"></div>
          </div>

          <section class="panel" id="debtCollectorPanel" aria-label="Debt Collector panel"></section>

          <div class="grid-2">
            <section class="panel" id="merchantPanel" aria-label="Merchant panel"></section>
            <section class="panel" id="forgePanel" aria-label="Forge panel"></section>
          </div>

          <section class="panel" id="questPanel" aria-label="Quest panel"></section>
        </div>
      </section>

      <section class="screen" id="screen-run" aria-labelledby="tab-run">
        <div class="stack-8">
          <section class="panel" id="runStatus" aria-label="Run status panel"></section>
          <section class="panel combat-panel" id="combatPanel" aria-label="Combat panel"></section>
          <section class="panel" id="combatLog" aria-label="Combat log"></section>
        </div>
      </section>

      <section class="screen" id="screen-gear" aria-labelledby="tab-gear">
        <div class="stack-8">
          <section class="panel gear-player-panel" id="gearPlayerPanel" aria-label="Gear player panel"></section>
          <section class="panel talent-panel" id="talentPanel" aria-label="Talent panel"></section>
          <section class="panel" id="equipmentPanel" aria-label="Equipment panel"></section>
          <section class="panel" id="filtersPanel" aria-label="Inventory filters panel"></section>
          <section class="panel" id="inventoryPanel" aria-label="Inventory panel"></section>
        </div>
      </section>

      <section class="screen" id="screen-dex" aria-labelledby="tab-dex">
        <div class="stack-8">
          <section class="panel" id="dexSummary" aria-label="Trophy Hall summary"></section>
          <section class="panel" id="monsterDex" aria-label="Monster trophy records"></section>
          <section class="panel" id="gearDex" aria-label="Gear trophy records"></section>
        </div>
      </section>

      <section class="screen" id="screen-archive" aria-labelledby="tab-archive">
        <div class="stack-8">
          <section class="panel" id="archivePanel" aria-label="Archive panel"></section>
          <section class="panel" id="settingsPanel" aria-label="Settings panel"></section>
        </div>
      </section>
    </main>

    <footer class="sticky-actions panel" id="stickyBar" aria-label="Context actions"></footer>
  </div>

  <!-- Inert renderer-prep templates. These do not render until a future renderer explicitly clones them. -->
  <template id="dd-panel-shell-template" data-template-status="inert">
    <section class="panel" data-template-slot="panel">
      <div class="stack-8" data-template-slot="content"></div>
    </section>
  </template>

  <template id="dd-empty-state-card-template" data-template-status="inert">
    <article class="panel" data-template-slot="empty-state">
      <h3 data-template-slot="title"></h3>
      <p class="muted" data-template-slot="body"></p>
    </article>
  </template>

  <div class="intro-modal-backdrop" id="introModal" hidden>
    <section class="panel intro-progress intro-modal-window" id="introModalContent" aria-label="DungeonDex introduction"></section>
  </div>

  <template id="panelShellTemplate">
    <section class="panel" data-template-role="panel-shell">
      <div data-template-slot="body"></div>
    </section>
  </template>

  <template id="emptyStateTemplate">
    <div class="empty-state" data-template-role="empty-state">
      <strong data-template-slot="title"></strong>
      <p class="small muted" data-template-slot="message"></p>
    </div>
  </template>

  <script>
    window.DUNGEONDEX_BUILD = '1.23.7';
    window.DUNGEONDEX_BUILD_QS = '1.23.7-rival-trace-result-detail-polish';
    (function(){
      var buildQs = window.DUNGEONDEX_BUILD_QS || '1.23.7-rival-trace-result-detail-polish';
      function forceBuildLabel(){
        var tag = document.getElementById('buildTag');
        if (tag) tag.textContent = 'DungeonDex v' + window.DUNGEONDEX_BUILD;
        document.title = 'DungeonDex v' + window.DUNGEONDEX_BUILD;
      }
      forceBuildLabel();
      window.addEventListener('DOMContentLoaded', forceBuildLabel);
      window.addEventListener('load', forceBuildLabel);
      window.setTimeout(forceBuildLabel, 250);
      window.setTimeout(forceBuildLabel, 1000);
    })();
  </script>

  <script>
    (function(){
      function fit(){
        var shell = document.querySelector('.app-shell');
        if(!shell) return;
        var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        if(h && h > 320){ shell.style.height = h + 'px'; shell.style.maxHeight = h + 'px'; }
      }
      window.addEventListener('load', fit, { passive: true });
      window.addEventListener('resize', fit, { passive: true });
      if(window.visualViewport){ window.visualViewport.addEventListener('resize', fit, { passive: true }); }
    })();
  </script>

  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;
      var buildQs = window.DUNGEONDEX_BUILD_QS || '1.23.7-rival-trace-result-detail-polish';
      var host = window.location.hostname;
      var isLocalDev = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
      if (isLocalDev) {
        window.addEventListener('load', function(){
          navigator.serviceWorker.getRegistrations().then(function(registrations){ registrations.forEach(function(reg){ reg.unregister(); }); }).catch(function(){});
          if (window.caches && caches.keys) caches.keys().then(function(keys){ keys.filter(function(key){ return key.indexOf('dungeon') !== -1 || key.indexOf('Dungeon') !== -1; }).forEach(function(key){ caches.delete(key); }); }).catch(function(){});
        });
        return;
      }
        window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js?build=' + buildQs).catch(function(){}); });
    })();
  </script>
