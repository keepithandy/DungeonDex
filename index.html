<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#06070a" />
  <link rel="manifest" href="./manifest.json" />
  <title>DungeonDex v1.4.9a</title>
  <link rel="stylesheet" href="./styles.css?build=1.4.9a-nav-center" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 id="buildTag">DungeonDex v1.4.9a</h1>
      </div>
      <div class="top-actions">
        <span class="save-status" id="saveStatus">Saved</span>
        <button class="ghost mini" id="saveBtn">Save</button>
        <button class="ghost mini" id="resetBtn">Reset</button>
      </div>
    </header>

    <nav class="tabs panel">
      <button class="tab active" data-screen="town">Town</button>
      <button class="tab" data-screen="run">Run</button>
      <button class="tab" data-screen="gear">Gear</button>
      <button class="tab" data-screen="dex">Trophy Hall</button>
      <button class="tab" data-screen="archive">Archive</button>
    </nav>

    <main class="screens">
      <section class="screen active" id="screen-town">
        <div class="stack-8">
          <div class="panel section-header">
            <div>
              <h2 id="districtName">Lowfire District</h2>
              <p id="districtLine">Lowfire holds the line. The Hollow Stair waits below.</p>
              <div class="district-wallet-slot" id="districtWalletSlot"></div>
            </div>
            <div class="inline-actions">
              <button class="primary" id="startRunBtn">Enter Dungeon</button>
              <button class="ghost" id="restBtn">Rest</button>
              <span class="rest-cost-chip" id="restCostPill" title="Rest cost">Cost --</span>
            </div>
            <div class="district-charter-slot" id="districtCharterSlot"></div>
          </div>

          <div class="grid-2">
            <section class="panel" id="merchantPanel"></section>
            <section class="panel" id="forgePanel"></section>
          </div>

          <section class="panel" id="questPanel"></section>
        </div>
      </section>

      <section class="screen" id="screen-run">
        <div class="stack-8">
          <section class="panel" id="runStatus"></section>
          <section class="panel combat-panel" id="combatPanel"></section>
          <section class="panel" id="combatLog"></section>
        </div>
      </section>

      <section class="screen" id="screen-gear">
        <div class="stack-8">
          <section class="panel gear-player-panel" id="gearPlayerPanel"></section>
          <section class="panel" id="equipmentPanel"></section>
          <section class="panel" id="filtersPanel"></section>
          <section class="panel" id="inventoryPanel"></section>
        </div>
      </section>

      <section class="screen" id="screen-dex">
        <div class="stack-8">
          <section class="panel" id="dexSummary"></section>
          <section class="panel" id="monsterDex"></section>
          <section class="panel" id="gearDex"></section>
        </div>
      </section>

      <section class="screen" id="screen-archive">
        <div class="stack-8">
          <section class="panel" id="archivePanel"></section>
          <section class="panel" id="settingsPanel"></section>
        </div>
      </section>
    </main>

    <footer class="sticky-actions panel" id="stickyBar"></footer>
  </div>

  <div class="intro-modal-backdrop" id="introModal" hidden>
    <section class="panel intro-progress intro-modal-window" id="introModalContent"></section>
  </div>

  <script>
    window.DUNGEONDEX_BUILD = '1.4.9a';
    window.DUNGEONDEX_BUILD_QS = '1.4.9a-nav-center';
    (function(){
      function forceBuildLabel(){
        var tag = document.getElementById('buildTag');
        if (tag) tag.textContent = 'DungeonDex v' + window.DUNGEONDEX_BUILD;
        document.title = 'DungeonDex v' + window.DUNGEONDEX_BUILD;
      }
      forceBuildLabel();
      window.addEventListener('DOMContentLoaded', forceBuildLabel);
      window.addEventListener('load', forceBuildLabel);
      window.setTimeout(forceBuildLabel, 250);
      window.setTimeout(forceBuildLabel, 1000);
    })();
  </script>

  <script>
    (function(){
      function fit(){
        var shell = document.querySelector('.app-shell');
        if(!shell) return;
        var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        if(h && h > 320){ shell.style.height = h + 'px'; shell.style.maxHeight = h + 'px'; }
      }
      window.addEventListener('load', fit, { passive: true });
      window.addEventListener('resize', fit, { passive: true });
      if(window.visualViewport){ window.visualViewport.addEventListener('resize', fit, { passive: true }); }
    })();
  </script>

  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;
      var host = window.location.hostname;
      var isLocalDev = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
      if (isLocalDev) {
        window.addEventListener('load', function(){
          navigator.serviceWorker.getRegistrations().then(function(registrations){ registrations.forEach(function(reg){ reg.unregister(); }); }).catch(function(){});
          if (window.caches && caches.keys) caches.keys().then(function(keys){ keys.filter(function(key){ return key.indexOf('dungeon') !== -1 || key.indexOf('Dungeon') !== -1; }).forEach(function(key){ caches.delete(key); }); }).catch(function(){});
        });
        return;
      }
      window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js?build=1.4.9a-nav-center').catch(function(){}); });
    })();
  </script>

  <script src="./app.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/00_core_constants_data.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/01_state_recovery.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/02_currency_pending_rewards.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/03_town_contracts_market.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/04_depth_progression_charters.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/05_elite_modifiers.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/06_scaling_generation_audits.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/07_player_combat_runtime.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/08_normalization_save.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/09_ui_common_intro.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/10_ui_town_shop.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/11_ui_run_gear_dex_archive.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/12_render_bindings_boot.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/13_devtools_overlay.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/16_relic_forge_crafting.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/17_relic_forge_clarity.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/18_relic_forge_compact_text.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/19_warden_talents_lowfire_board.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/20_town_currency_clean_strip.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/21_build_label_guard.js?build=1.4.9a-nav-center"></script>
  <script src="./js/systems/22_nav_centering.js?build=1.4.9a-nav-center"></script>
</body>
</html>
