<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#06070a" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="data:," />
  <title>DungeonDex v1.23.8.09</title>
  <link rel="stylesheet" href="./styles.css?build=1.23.8.09-build-label-alignment" />
  <link rel="stylesheet" href="./styles_lore_layer.css?build=1.23.8.09-build-label-alignment" />
  <style>
    /* v1.23.8 Merchant Gear Upgrades Replace Talent System update. */
    .panel {
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.035);
    }

    

    /* All .ddx-* classes above are layout/semantic wrappers.
       Existing .panel, .tab, .button, and system-generated classes
       continue to control visual appearance and behavior.
       No disruption to existing JS selectors, IDs, or data-attributes. */

    .section-header.panel,
    .tabs.panel,
    .sticky-actions.panel {
      border-color: rgba(255,213,148,0.10);
    }

    .tab.active,
    .primary {
      box-shadow: 0 0 14px rgba(255,162,70,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Town header mobile lock: controls stay before district content. */
    #screen-town > .stack-8 > .section-header.panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content;
      grid-template-areas:
        "district actions"
        "charter charter";
      align-items: start;
    }

    #screen-town > .stack-8 > .section-header.panel > div:first-child {
      grid-area: district;
      min-width: 0;
    }

    #screen-town > .stack-8 > .section-header.panel > .inline-actions {
      grid-area: actions;
      justify-self: end;
      align-self: start;
      flex-wrap: nowrap;
      width: auto;
    }

    #screen-town > .stack-8 > .section-header.panel > .district-charter-slot {
      grid-area: charter;
      min-width: 0;
    }

    @media (max-width: 700px) {
      #screen-town > .stack-8 > .section-header.panel {
        grid-template-columns: 1fr;
        grid-template-areas:
          "actions"
          "district"
          "charter";
      }

      #screen-town > .stack-8 > .section-header.panel > .inline-actions {
        justify-self: stretch;
        width: 100%;
        flex-wrap: wrap;
      }

      #screen-town > .stack-8 > .section-header.panel > .inline-actions > button {
        flex: 1 1 132px;
      }

    }

    /* Temporary Revisit preview hide: keep only playable, active, or completed lanes visible. */
    .revisit-foundation-panel .revisit-unfinished-lanes-card,
    .revisit-foundation-panel .revisit-echo-card.locked,
    .revisit-foundation-panel .revisit-lane-card.locked {
      display: none !important;
    }

    .revisit-foundation-panel:not(:has(.revisit-echo-card.ready, .revisit-lane-card.ready, .revisit-lane-card.active, .revisit-lane-card.completed)) {
      display: none !important;
    }

    /* Temporary town board cleanup: hide empty planning boards. */
    #questPanel .elite-contract-empty,
    #questPanel .elite-contract-board:has(.elite-contract-empty) {
      display: none !important;
    }

    /* v1.6.21 uncommon rarity hotfix: restore the pre-theme green uncommon read. */
    .rarity-uncommon {
      color: #a8f0b3;
    }

    .pill.rarity-uncommon,
    .rarity-uncommon.pill {
      color: #a8f0b3;
      border-color: rgba(168,240,179,0.30);
      background: rgba(168,240,179,0.075);
    }

    .rarity-card-uncommon {
      --rarity-bg: rgba(168,240,179,0.045);
      --rarity-border: rgba(168,240,179,0.18);
      --rarity-glow: rgba(168,240,179,0.06);
      --rarity-sheen: rgba(168,240,179,0.11);
    }

    /* Intro modal CSS cleanup: compact, readable, and mobile-safe. */
    .threshold-hero {
      gap: 9px;
      padding: 13px;
    }

    .threshold-district-card {
      padding: 9px 10px;
    }

    .threshold-progress {
      gap: 5px;
      padding: 8px 9px;
    }

    .threshold-roadmap-card {
      gap: 8px;
      padding: 9px;
      border-radius: 14px;
      border-color: rgba(255,214,151,0.13);
      background: rgba(0,0,0,0.18);
      box-shadow: none;
    }

    .threshold-roadmap-head {
      gap: 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,214,151,0.10);
    }

    .threshold-roadmap-card .threshold-label {
      font-family: var(--font);
      font-size: 0.6rem;
      line-height: 1.1;
      letter-spacing: 0.12em;
    }

    .threshold-roadmap-copy {
      max-width: 34rem;
      color: rgba(240,234,222,0.72);
      font-family: var(--font);
      font-size: clamp(0.72rem, 2vw, 0.82rem);
      line-height: 1.3;
    }

    .threshold-roadmap-list {
      gap: 5px;
    }

    .threshold-roadmap-row {
      grid-template-columns: 5.35rem minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 34px;
      padding: 7px 8px;
      border-radius: 10px;
      border-color: rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.20);
    }

    .threshold-roadmap-key {
      color: #f6d9a1;
      font-family: var(--font);
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      line-height: 1;
      white-space: nowrap;
    }

    .threshold-roadmap-value {
      min-width: 0;
      color: rgba(248,246,238,0.88);
      font-family: var(--font);
      font-size: clamp(0.74rem, 2.2vw, 0.84rem);
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .threshold-footer span {
      padding: 6px 8px;
      font-size: 0.72rem;
    }

    @media (max-width: 430px) {
      .threshold-hero {
        gap: 8px;
        padding: 11px;
      }

      .threshold-roadmap-row {
        grid-template-columns: 1fr;
        gap: 4px;
        align-items: start;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell ddx-shell">
    <header class="topbar ddx-guild-header" aria-labelledby="buildTag" role="banner">
      <div class="ddx-header-title-slot">
        <h1 id="buildTag" class="ddx-lore-kicker">DungeonDex v1.23.8.09</h1>
      </div>
      <div class="top-actions ddx-action-row" aria-label="Save controls">
        <span class="save-status" id="saveStatus" aria-live="polite">Saved</span>
        <button class="ghost mini" id="saveBtn" type="button">Save</button>
        <button class="ghost mini" id="resetBtn" type="button">Reset</button>
      </div>
    </header>

    <nav class="tabs panel ddx-nav-guild-bar" aria-label="Guild Navigation Routes">
      <button class="tab active" data-screen="town" id="tab-town" type="button" aria-controls="screen-town">Town</button>
      <button class="tab" data-screen="run" id="tab-run" type="button" aria-controls="screen-run">Run</button>
      <button class="tab" data-screen="gear" id="tab-gear" type="button" aria-controls="screen-gear">Gear</button>
      <button class="tab" data-screen="dex" id="tab-dex" type="button" aria-controls="screen-dex">Archive</button>
      <button class="tab" data-screen="archive" id="tab-archive" type="button" aria-controls="screen-archive">Journal</button>
    </nav>

    <main class="screens ddx-main-viewport" aria-label="DungeonDex screens" role="main">
      <section class="screen active ddx-region ddx-region-town" id="screen-town" aria-labelledby="tab-town" role="region" aria-label="Town">
        <div class="stack-8 ddx-view-stack">
          <header class="panel section-header ddx-ledger-card ddx-guild-ledger" role="banner" aria-label="Guild Ledger">
            <div class="ddx-record-title">
              <h2 id="districtName" class="ddx-record-name">Lowfire District</h2>
              <p id="districtLine" class="ddx-record-meta">Lowfire holds the line. The Hollow Stair waits below.</p>
              <div class="district-wallet-slot ddx-wallet-slot" id="districtWalletSlot"></div>
              <div class="district-wallet-slot ddx-revisit-slot" id="revisitFoundationSlot"></div>
            </div>
            <div class="inline-actions ddx-action-row" aria-label="Town actions">
              <button class="primary" id="startRunBtn" type="button">Enter Dungeon</button>
              <button class="ghost rest-action-btn" id="restBtn" type="button">
                <span class="rest-action-label">Rest</span>
                <span class="rest-cost-chip ddx-cost-indicator" id="restCostPill" title="Rest cost">--</span>
              </button>
            </div>
            <div class="district-charter-slot ddx-charter-display" id="districtCharterSlot"></div>
          </header>

          <section class="panel ddx-contract-card ddx-debt-card" id="debtCollectorPanel" aria-label="Debt Pressure" role="region"></section>

          <div class="grid-2 ddx-merchant-pair">
            <section class="panel ddx-merchant-card ddx-merchant-ledger" id="merchantPanel" aria-label="Merchant Ledger" role="region"></section>
            <section class="panel ddx-merchant-card ddx-forge-counter" id="forgePanel" aria-label="Forge Counter" role="region"></section>
          </div>

          <section class="panel ddx-notice-board ddx-quest-board" id="questPanel" aria-label="Town Notice Board" role="region"></section>
        </div>
      </section>

      <section class="screen ddx-region ddx-region-run" id="screen-run" aria-labelledby="tab-run" role="region" aria-label="Dungeon Expedition">
        <div class="stack-8 ddx-view-stack">
          <section class="panel ddx-contract-card ddx-dungeon-writ" id="runStatus" aria-label="Dungeon Writ" role="region"></section>
          <section class="panel combat-panel ddx-combat-arena" id="combatPanel" aria-label="Combat Arena" role="region"></section>
          <section class="panel ddx-archive-card ddx-combat-record" id="combatLog" aria-label="Combat Record" role="region"></section>
        </div>
      </section>

      <section class="screen ddx-region ddx-region-gear" id="screen-gear" aria-labelledby="tab-gear" role="region" aria-label="Relic Hall">
        <div class="stack-8 ddx-view-stack">
          <section class="panel gear-player-panel ddx-ledger-card ddx-gear-player-ledger" id="gearPlayerPanel" aria-label="Gear Hall Status" role="region"></section>
          <section class="panel gear-upgrade-summary-panel ddx-merchant-card ddx-gear-summary" id="gearUpgradeSummaryPanel" aria-label="Upgrade Receipt" role="region"></section>
          <section class="panel ddx-merchant-card ddx-equipment-ledger" id="equipmentPanel" aria-label="Equipment Ledger" role="region"></section>
          <section class="panel ddx-archive-card ddx-filter-record" id="filtersPanel" aria-label="Archive Filters" role="region"></section>
          <section class="panel ddx-archive-card ddx-gear-archive" id="inventoryPanel" aria-label="Relic Archive" role="region"></section>
        </div>
      </section>

      <section class="screen ddx-region ddx-region-dex" id="screen-dex" aria-labelledby="tab-dex" role="region" aria-label="Archive & Trophies">
        <div class="stack-8 ddx-view-stack">
          <section class="panel ddx-ledger-card ddx-archive-summary" id="dexSummary" aria-label="Archive Summary" role="region"></section>
          <section class="panel ddx-archive-card ddx-monster-archive" id="monsterDex" aria-label="Monster Archive" role="region"></section>
          <section class="panel ddx-archive-card ddx-gear-trophy-archive" id="gearDex" aria-label="Gear Trophy Records" role="region"></section>
        </div>
      </section>

      <section class="screen ddx-region ddx-region-archive" id="screen-archive" aria-labelledby="tab-archive" role="region" aria-label="Guild Journal">
        <div class="stack-8 ddx-view-stack">
          <section class="panel ddx-journal-card ddx-guild-journal" id="archivePanel" aria-label="Guild Journal" role="region"></section>
          <section class="panel ddx-ledger-card ddx-settings-ledger" id="settingsPanel" aria-label="Archive Settings" role="region"></section>
        </div>
      </section>
    </main>

    <footer class="sticky-actions panel ddx-action-strip" id="stickyBar" aria-label="Action Strip" role="contentinfo"></footer>
  </div>

  <!-- Inert renderer-prep templates. These do not render until a future renderer explicitly clones them. -->
  <template id="dd-panel-shell-template" data-template-status="inert">
    <section class="panel" data-template-slot="panel">
      <div class="stack-8" data-template-slot="content"></div>
    </section>
  </template>

  <template id="dd-empty-state-card-template" data-template-status="inert">
    <article class="panel" data-template-slot="empty-state">
      <h3 data-template-slot="title"></h3>
      <p class="muted" data-template-slot="body"></p>
    </article>
  </template>

  <div class="intro-modal-backdrop" id="introModal" hidden>
    <section class="panel intro-progress intro-modal-window" id="introModalContent" aria-label="DungeonDex introduction"></section>
  </div>

  <template id="panelShellTemplate">
    <section class="panel" data-template-role="panel-shell">
      <div data-template-slot="body"></div>
    </section>
  </template>

  <template id="emptyStateTemplate">
    <div class="empty-state" data-template-role="empty-state">
      <strong data-template-slot="title"></strong>
      <p class="small muted" data-template-slot="message"></p>
    </div>
  </template>

  <script>
    window.DUNGEONDEX_BUILD = '1.23.8.09';
    window.DUNGEONDEX_BUILD_QS = '1.23.8.09-build-label-alignment';
    (function(){
      var buildQs = window.DUNGEONDEX_BUILD_QS || '1.23.8.09-build-label-alignment';
      function forceBuildLabel(){
        var tag = document.getElementById('buildTag');
        if (tag) tag.textContent = 'DungeonDex v' + window.DUNGEONDEX_BUILD;
        document.title = 'DungeonDex v' + window.DUNGEONDEX_BUILD;
      }
      forceBuildLabel();
      window.addEventListener('DOMContentLoaded', forceBuildLabel);
      window.addEventListener('load', forceBuildLabel);
      window.setTimeout(forceBuildLabel, 250);
      window.setTimeout(forceBuildLabel, 1000);
    })();
  </script>

  <script>
    (function(){
      function fit(){
        var shell = document.querySelector('.app-shell');
        if(!shell) return;
        var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        if(h && h > 320){ shell.style.height = h + 'px'; shell.style.maxHeight = h + 'px'; }
      }
      window.addEventListener('load', fit, { passive: true });
      window.addEventListener('resize', fit, { passive: true });
      if(window.visualViewport){ window.visualViewport.addEventListener('resize', fit, { passive: true }); }
    })();
  </script>

  <script>
    (function(){
      if (!('serviceWorker' in navigator)) return;
      var buildQs = window.DUNGEONDEX_BUILD_QS || '1.23.8.09-build-label-alignment';
      var host = window.location.hostname;
      var isLocalDev = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
      if (isLocalDev) {
        window.addEventListener('load', function(){
          navigator.serviceWorker.getRegistrations().then(function(registrations){ registrations.forEach(function(reg){ reg.unregister(); }); }).catch(function(){});
          if (window.caches && caches.keys) caches.keys().then(function(keys){ keys.filter(function(key){ return key.indexOf('dungeon') !== -1 || key.indexOf('Dungeon') !== -1; }).forEach(function(key){ caches.delete(key); }); }).catch(function(){});
        });
        return;
      }
        window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js?build=' + buildQs).catch(function(){}); });
    })();
  </script>
