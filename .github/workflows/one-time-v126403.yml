name: One-time v1.26.4.03 version alignment

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-v126403.yml

permissions:
  contents: write

jobs:
  align-version:
    if: github.event.head_commit.message == 'chore: trigger v1.26.4.03 version alignment'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Align version, cache, docs, and smoke authority
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          OLD_VERSION = "1.26.4"
          NEW_VERSION = "1.26.4.03"
          OLD_BUILD = "1.26.4-mobile-interface-release-hygiene"
          NEW_BUILD = "1.26.4.03-mobile-navigation-polish"
          OLD_RELEASE = "v1.26.4 Mobile Interface + Release Hygiene"
          NEW_RELEASE = "v1.26.4.03 Mobile Navigation Polish"

          def load(path):
              return Path(path).read_text(encoding="utf-8")

          def save(path, text):
              Path(path).write_text(text, encoding="utf-8")

          def replace_required(text, old, new, label, count=-1):
              if old not in text:
                  raise SystemExit(f"missing expected {label}: {old}")
              return text.replace(old, new, count)

          # VERSION.md is the authority.
          path = "VERSION.md"
          text = load(path)
          text = replace_required(text, OLD_RELEASE, NEW_RELEASE, path, 3)
          text = replace_required(text, OLD_BUILD, NEW_BUILD, path, 1)
          save(path, text)

          # Reader-facing baseline; this file contains only current-version references.
          path = "README.md"
          text = load(path)
          text = replace_required(text, "v1.26.4", "v1.26.4.03", path)
          save(path, text)

          # Permanent history: update pointers and insert a new entry while preserving v1.26.4 history.
          path = "CHANGELOG.md"
          text = load(path)
          text = replace_required(text, f"* Public/live itch version: `{OLD_RELEASE}`", f"* Public/live itch version: `{NEW_RELEASE}`", path, 1)
          text = replace_required(text, f"* Current local package baseline: `{OLD_RELEASE}`", f"* Current local package baseline: `{NEW_RELEASE}`", path, 1)
          text = replace_required(text, f"* Current development target: `{OLD_RELEASE}`", f"* Current development target: `{NEW_RELEASE}`", path, 1)
          text = replace_required(text, f"* Current build/cache label: `{OLD_BUILD}`", f"* Current build/cache label: `{NEW_BUILD}`", path, 1)
          marker = "## v1.26.4 - Mobile Interface + Release Hygiene"
          section = """## v1.26.4.03 - Mobile Navigation Polish

* Removed the touch-navigation content gutter so the side drawer overlays Town instead of permanently shifting the playable viewport to the right.
* Added stronger internal padding, route spacing, touch heights, border definition, and toggle placement to the expanded mobile navigation drawer.
* Preserved the established side-rail routes, combat-only navigation hide, safe-area positioning, desktop behavior, and all gameplay systems.
* No combat, rewards, economy, save schema, dungeon entry, Talent, Debt, progression, Revisit behavior, or gear behavior changed.
* No release package was created for this source-only version alignment.

---

"""
          if "## v1.26.4.03 - Mobile Navigation Polish" not in text:
              text = replace_required(text, marker, section + marker, path, 1)
          save(path, text)

          # Current status mirrors the new active baseline while retaining the prior section as history.
          path = "docs/status/CURRENT_NOTES.md"
          text = load(path)
          text = replace_required(text, "- DungeonDex v1.26.4 - Mobile Interface + Release Hygiene", "- DungeonDex v1.26.4.03 - Mobile Navigation Polish", path, 1)
          marker = "## v1.26.4 Mobile Interface + Release Hygiene"
          section = """## v1.26.4.03 Mobile Navigation Polish
- Touch/mobile navigation no longer reserves a permanent left content gutter; the closed rail and opened drawer overlay the viewport.
- The opened drawer now has clearer internal padding, 8px route spacing, 46px route targets, improved edge definition, and a better-positioned 44px toggle.
- Build/cache labels use `1.26.4.03-mobile-navigation-polish`.
- Desktop side-rail behavior, combat navigation hiding, safe-area handling, route order, and route destinations remain unchanged.
- Save compatibility, combat, rewards, economy, Merchant Gear Upgrades, dungeon entry, Talent, Debt, progression, and Revisit behavior remain unchanged.
- No itch/package builder was run and no release package was created.

"""
          if "## v1.26.4.03 Mobile Navigation Polish" not in text:
              text = replace_required(text, marker, section + marker, path, 1)
          save(path, text)

          # Version/cache procedure target.
          path = "docs/VERSION_CACHE_AUTHORITY.md"
          text = load(path)
          text = replace_required(text, OLD_RELEASE, NEW_RELEASE, path, 1)
          text = replace_required(text, f"`{OLD_VERSION}`", f"`{NEW_VERSION}`", path, 1)
          text = replace_required(text, OLD_BUILD, NEW_BUILD, path, 1)
          save(path, text)

          # Runtime pointer.
          path = "app.js"
          text = load(path)
          old_header = """// DungeonDex v1.26.4 runtime pointer.
// Runtime code now lives in ./js/systems/*.js and is loaded from index.html in numeric order.
// See ./js/systems/README.md for the system map.
//
// v1.26.4: Mobile Interface + Release Hygiene
// - Hardens navigation, touch capture, Town hierarchy, wrapping, modal access, and state clarity.
// - Preserves the Town runtime-layer cleanup; obsolete cleanup shells stay retired.
// - Retains the v1.26.3 Boss 2 correction and scaling matrix unchanged.
// - Preserves gameplay scaling, combat, rewards, upgrades, saves, and Revisit behavior.
"""
          new_header = """// DungeonDex v1.26.4.03 runtime pointer.
// Runtime code now lives in ./js/systems/*.js and is loaded from index.html in numeric order.
// See ./js/systems/README.md for the system map.
//
// v1.26.4.03: Mobile Navigation Polish
// - Removes the touch side-rail content gutter so navigation overlays the viewport.
// - Adds drawer padding, route spacing, touch sizing, and edge definition.
// - Preserves desktop navigation, combat controls, gameplay, saves, and Revisit behavior.
"""
          text = replace_required(text, old_header, new_header, path, 1)
          text = replace_required(text, OLD_BUILD, NEW_BUILD, path)
          text = replace_required(text, "window.DUNGEONDEX_BUILD = '1.26.4';", "window.DUNGEONDEX_BUILD = '1.26.4.03';", path, 1)
          save(path, text)

          # Active HTML labels and every direct cache query.
          path = "index.html"
          text = load(path)
          text = replace_required(text, OLD_BUILD, NEW_BUILD, path)
          text = replace_required(text, "DungeonDex v1.26.4", "DungeonDex v1.26.4.03", path)
          text = replace_required(text, "window.DUNGEONDEX_BUILD = '1.26.4';", "window.DUNGEONDEX_BUILD = '1.26.4.03';", path, 1)
          save(path, text)

          # Service-worker cache authority.
          path = "sw.js"
          text = load(path)
          text = replace_required(text, OLD_BUILD, NEW_BUILD, path)
          save(path, text)

          # Core runtime visible build constants.
          path = "js/systems/00_core_constants_data.js"
          text = load(path)
          text = replace_required(text, "const BUILD = '1.26.4';", "const BUILD = '1.26.4.03';", path, 1)
          text = replace_required(text, "const VISIBLE_VERSION_LABEL = 'DungeonDex v1.26.4';", "const VISIBLE_VERSION_LABEL = 'DungeonDex v1.26.4.03';", path, 1)
          save(path, text)

          # Build-label repair guard.
          path = "js/systems/21_build_label_guard.js"
          text = load(path)
          text = replace_required(text, "// DungeonDex v1.26.4 - Build label guard.", "// DungeonDex v1.26.4.03 - Build label guard.", path, 1)
          text = replace_required(text, "const BUILD = '1.26.4';", "const BUILD = '1.26.4.03';", path, 1)
          text = replace_required(text, OLD_BUILD, NEW_BUILD, path)
          save(path, text)

          # Public Revisit response reports the active public version without changing its gate.
          path = "js/systems/44_revisit_lowfire_board_slot.js"
          text = load(path)
          text = replace_required(text, "// v1.26.4 Revisit surface: Trophy Echo only.", "// v1.26.4.03 Revisit surface: Trophy Echo only.", path, 1)
          text = replace_required(text, "DungeonDex v1.26.4 public Revisit surface only allows Trophy Echo.", "DungeonDex v1.26.4.03 public Revisit surface only allows Trophy Echo.", path, 1)
          save(path, text)

          # Focused authority smoke.
          path = "tests/smoke/smoke_app_wiring_cache_manifest_v1.mjs"
          text = load(path)
          text = replace_required(text, "const VISIBLE_BUILD = '1.26.4';", "const VISIBLE_BUILD = '1.26.4.03';", path, 1)
          text = replace_required(text, "const RELEASE_NAME = 'Mobile Interface + Release Hygiene';", "const RELEASE_NAME = 'Mobile Navigation Polish';", path, 1)
          text = replace_required(text, OLD_BUILD, NEW_BUILD, path)
          text = text.replace("v1.26.4 build/cache authority mismatch(es)", "v1.26.4.03 build/cache authority mismatch(es)")
          save(path, text)

          # Compact-run labels are descriptive only; align them with the active baseline.
          path = "smoke_compact_suite.mjs"
          text = load(path)
          text = replace_required(text, "v1.26.4", "v1.26.4.03", path)
          save(path, text)

          # Align active smoke expectations that mirror the visible/build label. Historical docs remain untouched.
          for path_obj in Path("tests/smoke").glob("*.mjs"):
              path = str(path_obj)
              text = load(path)
              original = text
              text = text.replace(OLD_BUILD, NEW_BUILD)
              text = text.replace("DungeonDex v1.26.4", "DungeonDex v1.26.4.03")
              text = text.replace("'1.26.4'", "'1.26.4.03'")
              text = text.replace('"1.26.4"', '"1.26.4.03"')
              if text != original:
                  save(path, text)

          # Explicit active-surface assertions.
          active_files = [
              "VERSION.md",
              "README.md",
              "CHANGELOG.md",
              "docs/status/CURRENT_NOTES.md",
              "docs/VERSION_CACHE_AUTHORITY.md",
              "index.html",
              "app.js",
              "sw.js",
              "js/systems/00_core_constants_data.js",
              "js/systems/21_build_label_guard.js",
              "js/systems/44_revisit_lowfire_board_slot.js",
              "tests/smoke/smoke_app_wiring_cache_manifest_v1.mjs",
          ]
          for path in active_files:
              text = load(path)
              if OLD_BUILD in text:
                  raise SystemExit(f"stale active build slug remains in {path}")

          print(f"Aligned DungeonDex to {NEW_RELEASE} ({NEW_BUILD})")
          PY

      - name: Validate focused version authority
        run: |
          node --check app.js
          node --check js/systems/22_nav_centering.js
          node --check js/systems/21_build_label_guard.js
          node tests/smoke/smoke_app_wiring_cache_manifest_v1.mjs

      - name: Run compact smoke suite
        run: node smoke_compact_suite.mjs

      - name: Commit aligned release labels
        run: |
          git config user.name "DungeonDex Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add VERSION.md README.md CHANGELOG.md docs/VERSION_CACHE_AUTHORITY.md docs/status/CURRENT_NOTES.md index.html app.js sw.js js/systems/00_core_constants_data.js js/systems/21_build_label_guard.js js/systems/44_revisit_lowfire_board_slot.js tests/smoke smoke_compact_suite.mjs
          git diff --cached --check
          git commit -m "release: v1.26.4.03 mobile navigation polish"
          git push origin HEAD:main
